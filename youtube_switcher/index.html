<!--
    2017.12.00 Example to show a friend a basic way to switch between videos in a pane
 -->
<html>
<head>
    <script type="text/javascript" src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script type="text/javascript" src="switcher.js"></script>
    <link rel="stylesheet" type="text/css" href="switcher.css" />
</head>
<body>
    <h1>A video switcher example</h1>
    <iframe src="https://www.youtube.com/embed/nPEfT13Zha4"
        id="media_frame" frameborder="0" gesture="media" allow="encrypted-media">
    </iframe>
    <p>Links below change the video pane above</p>
    <ul>
        <li><a href="https://www.youtube.com/embed/IEdy6XHkd9k" class="ytLink">Link Name 1</a></li>
        <li><a href="https://www.youtube.com/embed/HyQD1poOQ8U" class="ytLink">Link Name 2</a></li>
        <li><a href="https://www.youtube.com/embed/TLQX_5kQHyo" class="ytLink">Link Name 3</a></li>
    </ul>
</body>
</html>
